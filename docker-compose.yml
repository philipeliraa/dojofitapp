services:
  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-dojofit}
      POSTGRES_USER: ${DB_USER:-dojofit}
      POSTGRES_PASSWORD: ${DB_PASS:-dojofit}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dojofit}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dojofit}
      DB_USER: ${DB_USER:-dojofit}
      DB_PASS: ${DB_PASS:-dojofit}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-me-in-production-min-256-bits-long!!}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
