spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dojofit}
    username: ${DB_USER:dojofit}
    password: ${DB_PASS:dojofit}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-me-in-production-min-256-bits-long!!}
  # Access token curto (vive só na memória do frontend); a sessão longa é o refresh token (cookie httpOnly)
  expiration-ms: 900000
  refresh-expiration-ms: 604800000

auth:
  cookie:
    # Em produção (HTTPS + frontend/backend em domínios distintos): secure=true e same-site=None
    secure: ${AUTH_COOKIE_SECURE:false}
    same-site: ${AUTH_COOKIE_SAMESITE:Lax}

google:
  client-id: ${GOOGLE_CLIENT_ID:}
